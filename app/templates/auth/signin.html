<!DOCTYPE html>
<html lang="{{ lang|default('en') }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}</script>
  <title>{{ _('Sign In') }} — WhatSend</title>
  <link rel="stylesheet" href="/static/css/app.css?v=4">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <h1>📬 WhatSend</h1>
        <h2>{{ _('Sign in') }}</h2>
      </div>
      <button id="themeToggleAuth" class="theme-toggle" style="font-size:1.2rem;margin-top:0.25rem;"></button>
    </div>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/auth/signin">
      <input type="text" name="username" placeholder="{{ _('Username') }}" required autocomplete="username">
      <input type="password" name="password" placeholder="{{ _('Password') }}" required autocomplete="current-password">
      <button type="submit">{{ _('Sign in') }}</button>
    </form>
    <p class="alt-link">{{ _("Don't have an account?") }} <a href="/auth/signup">{{ _('Sign up') }}</a></p>
  </div>
<script>
const t = document.getElementById('themeToggleAuth');
function u(){const d=document.documentElement.getAttribute('data-theme')==='dark';t.textContent=d?'\u2600\uFE0F':'\uD83C\uDF19'}
t.addEventListener('click',function(){const d=document.documentElement.getAttribute('data-theme')==='dark';const n=d?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);u()});
u();
</script>
</body>
</html>
