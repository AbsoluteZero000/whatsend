{% extends "base.html" %}
{% block title %}{{ _('Change Timezone') }} — Zamzam{% endblock %}
{% block content %}
<div class="section-header">
  <h1>{{ _('Change Timezone') }}</h1>
</div>
<div class="form-card">
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="POST" action="/auth/timezone">
    <label for="timezone">{{ _('Timezone') }}</label>
    <select id="timezone" name="timezone" required>
      {% for tz in timezones %}
      <option value="{{ tz }}" {% if tz == current_tz %}selected{% endif %}>{{ tz }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
    <a href="/dashboard" class="btn btn-secondary">{{ _('Cancel') }}</a>
  </form>
</div>
{% endblock %}
