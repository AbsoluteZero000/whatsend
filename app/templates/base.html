<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}</script>
  <title>{% block title %}{{ _('WhatsApp Scheduler') }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/css/app.css?v=4">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/dashboard" class="brand">📬 {{ _('WhatSend') }}</a>
      <div class="nav-links">
        <a href="/dashboard">{{ _('Dashboard') }}</a>
        <a href="/tokens">{{ _('Tokens') }}</a>
        <a href="/jobs">{{ _('Jobs') }}</a>
        <a href="/logs">{{ _('Logs') }}</a>
        <a href="/about">{{ _('Help') }}</a>
        <a href="/auth/profile">{{ _('Profile') }}</a>
        <button id="themeToggle" class="theme-toggle"></button>
        <form method="POST" action="/auth/lang" class="lang-form">
          <input type="hidden" name="lang" value="{{ 'ar' if lang == 'en' else 'en' }}">
          <button type="submit" class="lang-toggle" title="{{ _('Toggle language') }}">
            {{ 'AR' if lang == 'en' else 'EN' }}
          </button>
        </form>
        <a href="/auth/signout">{{ _('Sign out') }}</a>
        {% if user_tz %}<a href="/auth/timezone" class="tz-badge">{{ user_tz }}</a>{% endif %}
        <span class="clock" id="clock"></span>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>📬 {{ _('WhatSend') }}</span>
    <span class="footer-links">
      <a href="/about">{{ _('Help') }}</a>
      <a href="https://github.com/absolutezero000/whatsend" target="_blank">GitHub</a>
    </span>
  </footer>
<script>
function updateClock() {
  const now = new Date();
  const locale = '{{ lang }}' === 'ar' ? 'ar-EG' : 'en-US';
  const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  document.getElementById('clock').textContent = now.toLocaleTimeString(locale, opts);
}
updateClock();
setInterval(updateClock, 1000);

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'n') { e.preventDefault(); window.location.href = '/jobs/create'; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('jobSearch')?.focus(); }
});

const themeToggle = document.getElementById('themeToggle');
function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  themeToggle.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
}
themeToggle.addEventListener('click', function() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeIcon();
});
updateThemeIcon();
</script>
</body>
</html>
