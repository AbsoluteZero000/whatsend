<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WhatsApp Scheduler{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/dashboard" class="brand">📬 WhatSend</a>
      <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/tokens">Tokens</a>
        <a href="/jobs">Jobs</a>
        <a href="/logs">Logs</a>
        <a href="/about">Help</a>
        <a href="/auth/signout">Sign out</a>
        {% if user_tz %}<span class="tz-badge">{{ user_tz }}</span>{% endif %}
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
