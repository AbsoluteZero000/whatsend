<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}</script>
  <title>{% block title %}{{ _('WhatsApp Scheduler') }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/css/app.css?v=10">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/dashboard" class="brand">📬 {{ _('WhatSend') }}</a>
      <div class="nav-links">
        <a href="/dashboard">{{ _('Dashboard') }}</a>
        <a href="/tokens">{{ _('Tokens') }}</a>
        <a href="/jobs">{{ _('Jobs') }}</a>
        <a href="/logs">{{ _('Logs') }}</a>
        <a href="/about">{{ _('Help') }}</a>
        <a href="/auth/profile">{{ _('Profile') }}</a>
        <button id="themeToggle" class="theme-toggle"></button>
        <form method="POST" action="/auth/lang" class="lang-form">
          <input type="hidden" name="lang" value="{{ 'ar' if lang == 'en' else 'en' }}">
          <button type="submit" class="lang-toggle" title="{{ _('Toggle language') }}">
            {{ 'AR' if lang == 'en' else 'EN' }}
          </button>
        </form>
        <a href="/auth/signout">{{ _('Sign out') }}</a>
        {% if user_tz %}<a href="/auth/timezone" class="tz-badge">{{ user_tz }}</a>{% endif %}
        <span class="clock" id="clock"></span>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>📬 {{ _('WhatSend') }}</span>
    <span class="footer-links">
      <a href="/about">{{ _('Help') }}</a>
      <a href="https://github.com/absolutezero000/whatsend" target="_blank">GitHub</a>
    </span>
  </footer>
<div id="global-spinner" class="spinner-overlay"><div class="spinner"></div></div>
<div id="toast-container" class="toast-container"></div>
<div id="confirm-modal" class="modal-overlay">
  <div class="modal-box">
    <p class="modal-message" id="confirm-message"></p>
    <div class="modal-actions">
      <button id="confirm-cancel" class="btn btn-secondary">{{ _('Cancel') }}</button>
      <button id="confirm-ok" class="btn btn-danger">{{ _('Delete') }}</button>
    </div>
  </div>
</div>
<script>
function updateClock() {
  const now = new Date();
  const locale = '{{ lang }}' === 'ar' ? 'ar-EG' : 'en-US';
  const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  document.getElementById('clock').textContent = now.toLocaleTimeString(locale, opts);
}
updateClock();
setInterval(updateClock, 1000);

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'n') { e.preventDefault(); window.location.href = '/jobs/create'; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('jobSearch')?.focus(); }
});

let htmxRequests = 0;
document.addEventListener('htmx:beforeRequest', function() {
  htmxRequests++;
  document.getElementById('global-spinner').classList.add('visible');
});
document.addEventListener('htmx:afterRequest', function() {
  htmxRequests--;
  if (htmxRequests <= 0) {
    htmxRequests = 0;
    document.getElementById('global-spinner').classList.remove('visible');
  }
});

let confirmForm = null;
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('visible');
  confirmForm = null;
}
function customConfirm(e, message) {
  e.preventDefault();
  confirmForm = e.target;
  document.getElementById('confirm-message').textContent = message;
  document.getElementById('confirm-modal').classList.add('visible');
}
document.getElementById('confirm-ok').addEventListener('click', function() {
  if (confirmForm) { confirmForm.submit(); }
  closeConfirm();
});
document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('confirm-modal').classList.contains('visible')) {
    closeConfirm();
  }
});

function toggleMsg(id) {
  var row = document.getElementById('msg-' + id);
  var btn = row.previousElementSibling.querySelector('.msg-toggle');
  row.classList.toggle('open');
  btn.classList.toggle('open');
}

function dismissOnboarding() {
  var overlay = document.getElementById('onboarding-overlay');
  if (!overlay) return;
  fetch('/auth/onboarded', { method: 'POST', headers: {'X-Requested-With': 'XMLHttpRequest'} });
  overlay.style.opacity = '0';
  setTimeout(function() { overlay.remove(); }, 300);
}

function showToast(message, type) {
  var container = document.getElementById('toast-container');
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { toast.classList.add('toast-visible'); }, 10);
  setTimeout(function() {
    toast.classList.remove('toast-visible');
    setTimeout(function() { toast.remove(); }, 300);
  }, 4000);
  toast.addEventListener('click', function() {
    toast.classList.remove('toast-visible');
    setTimeout(function() { toast.remove(); }, 300);
  });
}
(function() {
  var params = new URLSearchParams(window.location.search);
  var msg = params.get('success') || params.get('error');
  if (msg) {
    showToast(msg, params.get('success') ? 'success' : 'error');
    var url = new URL(window.location);
    url.searchParams.delete('success');
    url.searchParams.delete('error');
    window.history.replaceState({}, '', url);
  }
})();

const themeToggle = document.getElementById('themeToggle');
function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  themeToggle.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
}
themeToggle.addEventListener('click', function() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeIcon();
});
updateThemeIcon();
</script>
</body>
</html>
