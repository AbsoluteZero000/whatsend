{% extends "base.html" %}
{% block title %}New Job — WhatSend{% endblock %}
{% block content %}
<div class="section-header">
  <h1>New Scheduled Job</h1>
</div>
<div class="form-card">
  <form method="POST" action="/jobs/create" enctype="multipart/form-data">
    <label for="token_id">API Token</label>
    <select id="token_id" name="token_id" required>
      <option value="">— Select —</option>
      {% for token in tokens %}
      <option value="{{ token.id }}">{{ token.name or token.api_token[:20] }}</option>
      {% endfor %}
    </select>

    <label for="label">Label (optional)</label>
    <input type="text" id="label" name="label" placeholder="e.g. Monday morning report">

    <label for="group_id">Group</label>
    <select id="group_id" name="group_id" required>
      <option value="">— Select a group —</option>
      {% for g in groups %}
      <option value="{{ g.id }}">{{ g.name or g.id }}</option>
      {% endfor %}
      <option value="__manual__">Manual entry…</option>
    </select>
    <input type="text" id="group_id_manual" name="group_id_manual" placeholder="120363xxxxxxxxxxxxxxxxxx@g.us" style="display:none;margin-top:0.5rem;">

    <label for="message">Message</label>
    <textarea id="message" name="message" required placeholder="Type your WhatsApp message here…"></textarea>

    <label for="image">Image (optional, max 5MB)</label>
    <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/gif,image/webp">
    <small style="color:#888;">Supported: JPEG, PNG, GIF, WebP — up to 5MB</small>

    <label for="trigger_type">Trigger Type</label>
    <select id="trigger_type" name="trigger_type" required>
      <option value="now">Send Now</option>
      <option value="date">One-time (date)</option>
      <option value="cron">Recurring (cron)</option>
    </select>

    <div id="trigger_value_group">
      <input type="datetime-local" id="trigger_value_date" name="trigger_value_date" style="display:none;">
      <input type="text" id="trigger_value_cron" name="trigger_value" placeholder='e.g. "0 9 * * 1"' style="display:none;">
    </div>
    <small id="trigger_hint" style="color:#888;">{{ user_tz }} — Cron: <code>MIN HOUR DOM MON DOW</code></small>

    <button type="submit" class="btn btn-primary">Create Job</button>
  </form>
</div>
<script>
  function toggleTriggerValue() {
    var type = document.getElementById('trigger_type').value;
    var show = type !== 'now';
    document.getElementById('trigger_value_group').style.display = show ? 'block' : 'none';
    document.getElementById('trigger_hint').style.display = show ? 'block' : 'none';
    document.getElementById('trigger_value_date').style.display = type === 'date' ? 'block' : 'none';
    document.getElementById('trigger_value_cron').style.display = type === 'cron' ? 'block' : 'none';
  }
  document.getElementById('trigger_type').addEventListener('change', toggleTriggerValue);
  toggleTriggerValue();

  document.getElementById('group_id').addEventListener('change', function() {
    var manual = document.getElementById('group_id_manual');
    manual.style.display = this.value === '__manual__' ? 'block' : 'none';
    if (this.value === '__manual__') manual.required = true;
    else manual.required = false;
  });
</script>
{% endblock %}
