{% extends "base.html" %}
{% block title %}New Job — WhatSend{% endblock %}
{% block content %}
<div class="section-header">
  <h1>New Scheduled Job</h1>
</div>
<div class="form-card">
  <form method="POST" action="/jobs/create" enctype="multipart/form-data">
    <label for="token_id">API Token</label>
    <select id="token_id" name="token_id" required>
      <option value="">— Select —</option>
      {% for token in tokens %}
      <option value="{{ token.id }}">{{ token.name or token.api_token[:20] }}</option>
      {% endfor %}
    </select>

    <label for="label">Label (optional)</label>
    <input type="text" id="label" name="label" placeholder="e.g. Monday morning report">

    <label for="group_id">Group</label>
    <select id="group_id" name="group_id" required>
      <option value="">— Select a group —</option>
      {% for g in groups %}
      <option value="{{ g.id }}">{{ g.name or g.id }}</option>
      {% endfor %}
      <option value="__manual__">Manual entry…</option>
    </select>
    <input type="text" id="group_id_manual" name="group_id_manual" placeholder="120363xxxxxxxxxxxxxxxxxx@g.us" style="display:none;margin-top:0.5rem;">

    <label for="message">Message</label>
    <textarea id="message" name="message" required placeholder="Type your WhatsApp message here…"></textarea>

    <label for="image">Image (optional, max 5MB)</label>
    <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/gif,image/webp">
    <small style="color:#888;">Supported: JPEG, PNG, GIF, WebP — up to 5MB</small>

    <label for="trigger_type">Trigger Type</label>
    <select id="trigger_type" name="trigger_type" required>
      <option value="now">Send Now</option>
      <option value="date">One-time (date)</option>
      <option value="cron">Recurring (cron)</option>
    </select>

    <div id="trigger_value_group">
      <input type="datetime-local" id="trigger_value_date" name="trigger_value_date" style="display:none;">
      <div id="trigger_value_cron" style="display:none;">
        <label for="cron_freq">Frequency</label>
        <select id="cron_freq" name="cron_freq">
          <option value="daily">Daily</option>
          <option value="weekdays">Weekdays (Mon–Fri)</option>
          <option value="weekly">Weekly (single day)</option>
          <option value="custom">Weekly (custom days)</option>
          <option value="monthly">Monthly</option>
        </select>
        <label for="cron_time">Time</label>
        <input type="time" id="cron_time" name="cron_time" value="09:00">
        <div id="cron_dow_group" style="display:none;">
          <label for="cron_dow">Day of week</label>
          <select id="cron_dow" name="cron_dow">
            <option value="0">Sunday</option>
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6">Saturday</option>
          </select>
        </div>
        <div id="cron_dom_group" style="display:none;">
          <label for="cron_dom">Day of month</label>
          <input type="number" id="cron_dom" name="cron_dom" min="1" max="31" value="1">
        </div>
        <div id="cron_custom_group" style="display:none;">
          <label>Days of week</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="cron_days" value="0"> Sun</label>
            <label><input type="checkbox" name="cron_days" value="1"> Mon</label>
            <label><input type="checkbox" name="cron_days" value="2"> Tue</label>
            <label><input type="checkbox" name="cron_days" value="3"> Wed</label>
            <label><input type="checkbox" name="cron_days" value="4"> Thu</label>
            <label><input type="checkbox" name="cron_days" value="5"> Fri</label>
            <label><input type="checkbox" name="cron_days" value="6"> Sat</label>
          </div>
        </div>
      </div>
    </div>
    <small id="trigger_hint" style="color:#888;">Timezone: {{ user_tz }}</small>

    <button type="submit" class="btn btn-primary">Create Job</button>
  </form>
</div>
<script>
  function toggleTriggerValue() {
    var type = document.getElementById('trigger_type').value;
    var show = type !== 'now';
    document.getElementById('trigger_value_group').style.display = show ? 'block' : 'none';
    document.getElementById('trigger_hint').style.display = show ? 'block' : 'none';
    document.getElementById('trigger_value_date').style.display = type === 'date' ? 'block' : 'none';
    document.getElementById('trigger_value_cron').style.display = type === 'cron' ? 'block' : 'none';
  }
  document.getElementById('trigger_type').addEventListener('change', toggleTriggerValue);
  toggleTriggerValue();

  function toggleCronFields() {
    var freq = document.getElementById('cron_freq').value;
    document.getElementById('cron_dow_group').style.display = freq === 'weekly' ? 'block' : 'none';
    document.getElementById('cron_custom_group').style.display = freq === 'custom' ? 'block' : 'none';
    document.getElementById('cron_dom_group').style.display = freq === 'monthly' ? 'block' : 'none';
  }
  document.getElementById('cron_freq').addEventListener('change', toggleCronFields);
  toggleCronFields();

  document.getElementById('group_id').addEventListener('change', function() {
    var manual = document.getElementById('group_id_manual');
    manual.style.display = this.value === '__manual__' ? 'block' : 'none';
    if (this.value === '__manual__') manual.required = true;
    else manual.required = false;
  });
</script>
{% endblock %}
