{% extends "base.html" %}
{% block title %}{{ _('Add API Token') }} — WhatSend{% endblock %}
{% block content %}
<div class="section-header">
  <h1>{{ _('Add API Token') }}</h1>
</div>
<div class="form-card">
  <form method="POST" action="/tokens/create">
    <label for="name">{{ _('Name (optional)') }}</label>
    <input type="text" id="name" name="name" placeholder="{{ _('Token name (optional)') }}">

    <label for="api_token">{{ _('Whapi.Cloud API Token') }}</label>
    <input type="text" id="api_token" name="api_token" required placeholder="{{ _('Paste your token here') }}">

    <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
  </form>
</div>
{% endblock %}
