app = "whatsend-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/data"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/whatsend.db"
  UPLOAD_DIR = "/data/uploads"

[deploy]
  release_command = "python -c 'from app.database import create_tables; import asyncio; asyncio.run(create_tables())'"
